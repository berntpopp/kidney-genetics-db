networks:
  npm_proxy_network:
    external: true
    name: ${NPM_SHARED_NETWORK_NAME:-npm_default}
  kidney_genetics_internal_net:
    driver: bridge
    name: kidney_genetics_internal_net

volumes:
  postgres_data:
  redis_data:
  db-backups:
  backend_cache:
  backend_data:

services:
  postgres:
    image: postgres:17-alpine@sha256:6f30057d31f5861b66f3545d4821f987aacf1dd920765f0acadea0c58ff975b1
    container_name: kidney_genetics_postgres
    networks:
      - kidney_genetics_internal_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kidney_genetics}
      POSTGRES_USER: ${POSTGRES_USER:-kidney_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # NO PORTS EXPOSED - Internal access only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kidney_user} -d ${POSTGRES_DB:-kidney_genetics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

    # SECURITY: Capability dropping
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE  # Needed for data directory permissions
      - FOWNER        # Needed for PostgreSQL to manage ownership

    # SECURITY: Resource limits
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
          pids: 500
        reservations:
          cpus: '0.5'
          memory: 512M
    ulimits:
      nproc: 512
      nofile:
        soft: 4096
        hard: 8192

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "10"
        compress: "true"

  redis:
    image: redis:7-alpine
    container_name: kidney_genetics_redis
    networks:
      - kidney_genetics_internal_net
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

    # SECURITY: Capability dropping
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE  # Needed for AOF persistence on volumes

    # SECURITY: Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          pids: 100
        reservations:
          cpus: '0.1'
          memory: 64M
    ulimits:
      nproc: 256
      nofile:
        soft: 2048
        hard: 4096

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
        compress: "true"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: kidney_genetics_backend:latest
    container_name: kidney_genetics_backend
    # Persistent storage for HTTP cache and bulk data downloads.
    # Must be owned by uid=1000 (kidney-api). Fix if needed:
    #   docker run --rm -v backend_cache:/d alpine chown -R 1000:1000 /d
    volumes:
      - backend_cache:/app/.cache
      - backend_data:/app/data
    networks:
      - npm_proxy_network
      - kidney_genetics_internal_net
    # NO PORTS EXPOSED - NPM connects via container name
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Note: Uses /health (not /api/health) - this is the actual endpoint defined in backend/app/main.py
      # The /api/ prefix is only added by nginx proxy for external requests
      # Uses Python urllib instead of curl (curl removed from production image for security)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

    # SECURITY: Capability dropping
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # NO cap_add - Python needs zero capabilities

    # SECURITY: Resource limits
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
          pids: 1000
        reservations:
          cpus: '0.5'
          memory: 512M
    ulimits:
      nproc: 512
      nofile:
        soft: 4096
        hard: 8192

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "10"
        compress: "true"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: kidney_genetics_frontend:latest
    container_name: kidney_genetics_frontend
    networks:
      - npm_proxy_network
      - kidney_genetics_internal_net
    # NO PORTS EXPOSED - NPM connects via container name
    environment:
      API_BASE_URL: /api
      WS_URL: /ws
      ENVIRONMENT: production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

    # SECURITY: Capability dropping
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE

    # SECURITY: Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
          pids: 200
        reservations:
          cpus: '0.25'
          memory: 128M
    ulimits:
      nproc: 256
      nofile:
        soft: 2048
        hard: 4096

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "10"
        compress: "true"

  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: kidney_genetics_db_backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "0 2 * * *"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      POSTGRES_EXTRA_OPTS: "--clean --if-exists --no-owner"
      HEALTHCHECK_PORT: 8081
    networks:
      - kidney_genetics_internal_net
    volumes:
      - db-backups:/backups
    restart: unless-stopped
    cap_drop:
      - ALL
